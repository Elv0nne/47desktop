name: Build Anime47 Desktop

# Chạy thủ công từ tab Actions (nút "Run workflow"), hoặc tự động mỗi khi
# push lên nhánh main.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-jar:
    # Bước 1-3 (publish library -> build provider -> build host-app) chạy
    # trên Linux vì nhanh hơn và đủ để ra .jar chạy được trên mọi OS.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Cài Gradle CLI
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        # library/build.gradle.kts vẫn khai báo target android() song song
        # với target jvm(), nên Gradle cần thấy Android SDK dù ta chỉ dùng
        # target jvm — bước này chỉ cài SDK, không build gì cho Android.

      - name: Cấp quyền thực thi cho gradlew
        working-directory: cloudstream-master
        run: chmod +x gradlew
        # Upload qua GitHub web (kéo thả) không giữ lại quyền thực thi của
        # file gradlew, nên cần cấp lại thủ công trước khi chạy ./gradlew.

      - name: Bước 1 — Publish library module (target jvm) ra Maven local
        working-directory: cloudstream-master
        run: ./gradlew :library:publishToMavenLocal --stacktrace

      - name: Kiểm tra library-jvm đã publish
        run: ls -la ~/.m2/repository/com/lagradost/api/library-jvm/*/

      - name: Bước 2 — Build Anime47Provider thành .jar
        working-directory: provider-jvm
        run: gradle jar --stacktrace

      - name: Bước 3 — Build host-app (.jar chạy được, gộp hết dependency)
        working-directory: cs3-desktop-host
        run: gradle :host-app:shadowJar --stacktrace

      - name: Gộp file để tải về
        run: |
          mkdir -p dist
          cp provider-jvm/build/libs/anime47provider.jar dist/
          cp cs3-desktop-host/host-app/build/libs/cs3-desktop-host.jar dist/

      - name: Upload artifact (.jar — chạy trên mọi OS có Java 17+)
        uses: actions/upload-artifact@v4
        with:
          name: anime47-desktop-jars
          path: dist/*.jar

  build-exe:
    # Bước riêng, chạy trên Windows thật để đóng gói .exe bằng jpackage —
    # jpackage không cross-compile được từ Linux sang Windows.
    needs: build-jar
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Tải lại .jar từ bước trước
        uses: actions/download-artifact@v4
        with:
          name: anime47-desktop-jars
          path: dist

      - name: Đóng gói .exe bằng jpackage
        shell: pwsh
        run: |
          jpackage `
            --input dist `
            --main-jar cs3-desktop-host.jar `
            --main-class com.thitbokobe.host.MainKt `
            --type exe `
            --name CloudStreamDesktop `
            --dest dist-exe

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: anime47-desktop-exe
          path: dist-exe/*.exe
